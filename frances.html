<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal Estilo Santillana</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="./comun.css">
</head>
<body>

    <header class="main-header">
        <div class="top-logos">
            <a href="./index.html">
                <img src="./imágenes/logo-santillana.png" alt="SANTILLANA" class="logo-santillana">
            </a>
            
            <div class="language-selector">
                <button id="lang-btn">Langue</button>
                <ul id="lang-menu">
                    <li><a href="./index.html">Español</a></li>
                    <li><a href="./ingles.html">English</a></li>
                    <li><a href="./frances.html">Français</a></li>
                    <li><a href="./marroqui.html">Dariya</a></li>
                    <li><a href="./portugues.html">Português</a></li>
                    <li><a href="./ucraniano.html">українська</a></li>
                </ul>
            </div>

            <a href="https://ceipmiraflores.es/web/" target="_blank">
                <img src="./imágenes/logo cole.png" alt="Miraflores" class="logo-school">
            </a>
        </div>

        <div class="hero-content">
            <p class="subtitle">Lengua Castellana 2º primaria</p>
            <h1 class="main-title">Langue espagnole</h1>
            <p class="course-detail">CE1 (2e année de primaire)</p>
        </div>

        <div class="arc-container">
            <div class="kids-illustration">
                <img src="./imágenes/image.png" alt="Fotos nuestras">
            </div>
            <div class="white-arc"></div>
        </div>
    </header>

    <main class="content-area">
        <div class="bottom-logos">
            <img src="./imágenes/logo uma.jpg" alt="UMA">
            <img src="./imágenes/logo profequerones.png" alt="Profe Bueno">
            <img src="./imágenes/logo facultad ed.png" alt="Facultad">
        </div>
        <a href="./frances/frances1.html" class="start-btn">📖 Entrer</a>
    </main>

    <script>
        const langBtn = document.getElementById('lang-btn');
        const langSelector = document.querySelector('.language-selector');

        // Función para abrir/cerrar
        langBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            langSelector.classList.toggle('open');
        });

        // Cerrar si se hace click fuera
        document.addEventListener('click', (e) => {
            if (!langSelector.contains(e.target)) {
                langSelector.classList.remove('open');
            }
        });
    </script>
</body>
</html>
